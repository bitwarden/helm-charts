suite: test component extraEnv, extraEnvFrom, extraVolumeMounts, and extraVolumes
templates:
  - templates/helpers.tpl
  - templates/admin.yaml
  - templates/api.yaml
  - templates/attachments.yaml
  - templates/events.yaml
  - templates/icons.yaml
  - templates/identity.yaml
  - templates/notifications.yaml
  - templates/scim.yaml
  - templates/sso.yaml
  - templates/web.yaml

tests:
  # api
  - it: api - should render extraEnv
    template: templates/api.yaml
    set:
      component.api.extraEnv[0].name: VAR
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: VAR
        documentIndex: 0

  - it: api - should not render extraEnv when empty
    template: templates/api.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].env
          value:
            - name: ASPNETCORE_URLS
              value: http://+:5000
        documentIndex: 0

  - it: api - should render extraEnvFrom
    template: templates/api.yaml
    set:
      component.api.extraEnvFrom[0].secretRef.name: extra-secret
    asserts:
      - contains:
          path: spec.template.spec.containers[0].envFrom
          content:
            secretRef:
              name: extra-secret
        documentIndex: 0

  - it: api - should not render extraEnvFrom when empty
    template: templates/api.yaml
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].envFrom
          content:
            secretRef:
              name: extra-secret
        documentIndex: 0

  - it: api - should render extraVolumeMounts
    template: templates/api.yaml
    set:
      component.api.extraVolumeMounts[0].mountPath: /etc/custom/config
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            mountPath: /etc/custom/config
        documentIndex: 0

  - it: api - should not render extra volume mounts when empty
    template: templates/api.yaml
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            mountPath: /etc/custom/config
        documentIndex: 0

  - it: api - should render extraVolumes
    template: templates/api.yaml
    set:
      component.api.extraVolumes[0].configMap.name: extra-configmap
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            configMap:
              name: extra-configmap
        documentIndex: 0

  - it: api - should not render extra volumes when empty
    template: templates/api.yaml
    asserts:
      - notContains:
          path: spec.template.spec.volumes
          content:
            configMap:
              name: extra-configmap
        documentIndex: 0

  - it: api - should render all four extras together
    template: templates/api.yaml
    set:
      component.api.extraEnv[0].name: VAR
      component.api.extraEnvFrom[0].configMapRef.name: extra-configmap
      component.api.extraVolumeMounts[0].mountPath: /etc/custom/config
      component.api.extraVolumes[0].configMap.name: extra-configmap
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: VAR
        documentIndex: 0
      - contains:
          path: spec.template.spec.containers[0].envFrom
          content:
            configMapRef:
              name: extra-configmap
        documentIndex: 0
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            mountPath: /etc/custom/config
        documentIndex: 0
      - contains:
          path: spec.template.spec.volumes
          content:
            configMap:
              name: extra-configmap
        documentIndex: 0

