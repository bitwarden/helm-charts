suite: BitwardenSecret CRD
templates:
  - bitwardensecret-crd.yaml
tests:
  - it: exposes the BitwardenSecret spec fields the chart contract depends on
    asserts:
      - equal:
          path: metadata.name
          value: bitwardensecrets.k8s.bitwarden.com
      - contains:
          path: spec.versions[0].schema.openAPIV3Schema.properties.spec.required
          content: authToken
      - contains:
          path: spec.versions[0].schema.openAPIV3Schema.properties.spec.required
          content: organizationId
      - contains:
          path: spec.versions[0].schema.openAPIV3Schema.properties.spec.required
          content: secretName
      - isNotNullOrEmpty:
          path: spec.versions[0].schema.openAPIV3Schema.properties.spec.properties.useSecretNames
      - isNotNullOrEmpty:
          path: spec.versions[0].schema.openAPIV3Schema.properties.spec.properties.onlyMappedSecrets
      - isNotNullOrEmpty:
          path: spec.versions[0].schema.openAPIV3Schema.properties.spec.properties.map
