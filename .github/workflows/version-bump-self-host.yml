name: Version Bump - Self Host
run-name: Version Bump to ${{ inputs.version_number }} - Self Host

on:
  workflow_dispatch:
    inputs:
      version_number:
        description: "New version (example: '1.0.1')"
        required: true
        type: string
      dry_run:
        description: "Dry run — skips committing to main"
        required: false
        default: false
        type: boolean

permissions: {}

jobs:
  trigger:
    name: Trigger version bump
    runs-on: ubuntu-24.04
    permissions:
      id-token: write
    steps:
      - name: Trigger version bump
        uses: bitwarden/gh-actions/trigger-actions@main
        with:
          azure_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          azure_tenant_id: ${{ secrets.AZURE_TENANT_ID }}
          azure_client_id: ${{ secrets.AZURE_CLIENT_ID }}
          task: helm-charts-version-bump-self-host
