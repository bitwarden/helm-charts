name: Version Bump - SM Operator
run-name: Version Bump to ${{ inputs.version_number }} - SM Operator

on:
  workflow_dispatch:
    inputs:
      version_number:
        description: "New Version"
        required: true
        type: string

permissions: {}

jobs:
  bump:
    name: "Bump Version to ${{ inputs.version_number }}"
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write # Azure OIDC for the trigger-actions composite
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Bump Version
        uses: bitwarden/gh-actions/version-bump@main
        with:
          version: ${{ inputs.version_number }}
          file_path: "charts/sm-operator/Chart.yaml"

      - name: Upload modified files
        id: upload
        uses: bitwarden/gh-actions/upload-modified-files@main
        with:
          artifact_name: modified-files

      # Build the trigger payload with jq so the dispatcher-supplied version number is
      # JSON-escaped, not interpolated into the data string (no break-out / key injection).
      - name: Build trigger data
        id: data
        env:
          ARTIFACT_NAME: ${{ steps.upload.outputs.artifact_name }}
          VERSION_NUMBER: ${{ inputs.version_number }}
        run: |
          JSON=$(jq -nc \
            --arg artifact_name "$ARTIFACT_NAME" \
            --arg target_branch "main" \
            --arg pr_title "Bump version to $VERSION_NUMBER" \
            --arg pr_body "Automated version bump to $VERSION_NUMBER" \
            '{artifact_name: $artifact_name, target_branch: $target_branch, pr_title: $pr_title, pr_body: $pr_body}')
          echo "json=$JSON" >> "$GITHUB_OUTPUT"

      - name: Trigger update
        uses: bitwarden/gh-actions/trigger-actions@main
        with:
          azure_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          azure_tenant_id: ${{ secrets.AZURE_TENANT_ID }}
          azure_client_id: ${{ secrets.AZURE_CLIENT_ID }}
          task: update-repository
          data: ${{ steps.data.outputs.json }}
