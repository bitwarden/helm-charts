name: Release
run-name: Release - ${{ inputs.release_mode }}

on:
  workflow_dispatch:
    inputs:
      release_mode:
        description: "Release Mode"
        default: "Standard Release"
        type: choice
        options:
          - Standard Release
          - Dry Run

jobs:
  release:
    name: Release Helm chart
    runs-on: ubuntu-22.04
    environment: Production
    permissions:
      actions: read
      contents: write
      packages: write
      pull-requests: write
      id-token: write
    steps:
      - name: Log in to Azure
        uses: bitwarden/gh-actions/azure-login@main
        with:
          subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          tenant_id: ${{ secrets.AZURE_TENANT_ID }}
          client_id: ${{ secrets.AZURE_CLIENT_ID }}

      - name: Get Azure Key Vault secrets
        id: get-kv-secrets
        uses: bitwarden/gh-actions/get-keyvault-secrets@main
        with:
          keyvault: gh-org-bitwarden
          secrets: "BW-GHAPP-ID,BW-GHAPP-KEY"

      - name: Log out from Azure
        uses: bitwarden/gh-actions/azure-logout@main

      - name: Generate GH App token
        uses: actions/create-github-app-token@29824e69f54612133e76f7eaac726eef6c875baf # v2.2.1
        id: app-token
        with:
          app-id: ${{ steps.get-kv-secrets.outputs.BW-GHAPP-ID }}
          private-key: ${{ steps.get-kv-secrets.outputs.BW-GHAPP-KEY }}
          permission-contents: write
          permission-pull-requests: write

      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: true
          ref: main
          token:  ${{ steps.app-token.outputs.token }}

      - name: Log in to Azure
        uses: bitwarden/gh-actions/azure-login@main
        with:
          subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          tenant_id: ${{ secrets.AZURE_TENANT_ID }}
          client_id: ${{ secrets.AZURE_CLIENT_ID }}

      - name: Setup git
        run: |
          git config --local user.name "bw-ghapp[bot]"
          git config --local user.email "178206702+bw-ghapp[bot]@users.noreply.github.com"

      - name: Set up Helm
        uses: Azure/setup-helm@5119fcb9089d432beecbf79bb2c7915207344b78 # v3.5
        with:
          version: v4.0.0

      - name: Download Helm chart artifact - Self Host
        uses: bitwarden/gh-actions/download-artifacts@main
        with:
          branch: main
          path: .cr-release-packages
          workflow: self-host.yml
          workflow_conclusion: success

      - name: Download Helm chart artifact - SM Operator
        uses: bitwarden/gh-actions/download-artifacts@main
        with:
          branch: main
          path: .cr-release-packages
          workflow: sm-operator.yml
          workflow_conclusion: success

      - name: Install chart-releaser
        uses: helm/chart-releaser-action@be16258da8010256c6e82849661221415f031968 # v1.5.0
        with:
          install_only: true

      - name: Upload chart packages
        if: ${{ github.event.inputs.release_mode != 'Dry Run' }}
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CR_OWNER: ${{ github.repository_owner }}
          CR_GIT_REPO: ${{ github.event.repository.name }}
          CR_GENERATE_RELEASE_NOTES: false
          CR_RELEASE_NOTES_FILE: CHANGELOG.md # Relative path to use chart specific CHANGELOG.md from respective chart directory
          CR_MAKE_RELEASE_LATEST: true
          CR_SKIP_EXISTING: true
        run: |
          cr upload \
            --commit "$(git rev-parse HEAD)" \
            --package-path .cr-release-packages

      - name: Generate Helm repo index
        if: ${{ github.event.inputs.release_mode != 'Dry Run' }}
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CR_OWNER: ${{ github.repository_owner }}
          CR_GIT_REPO: ${{ github.event.repository.name }}
        run: cr index

      - name: Push index update to gh-pages via PR
        if: ${{ github.event.inputs.release_mode != 'Dry Run' }}
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          GH_APPROVE_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="update-helm-index-${{ github.run_id }}"

          git fetch origin gh-pages
          git checkout -b "$BRANCH" origin/gh-pages
          cp .cr-index/index.yaml index.yaml
          git add index.yaml
          git commit -m "Update Helm chart index"
          git push origin "$BRANCH"

          gh pr create \
            --title "Update Helm chart index" \
            --body "Automated Helm repo index update from release workflow run ${{ github.run_id }}." \
            --base gh-pages \
            --head "$BRANCH"

          GH_TOKEN="$GH_APPROVE_TOKEN" gh pr review "$BRANCH" --approve

          gh pr merge "$BRANCH" \
            --squash \
            --delete-branch
