name: Self Host

on:
  push:
    branches:
      - main
    paths:
      - "charts/self-host/**"
      - "scripts/**"
  pull_request:
    paths:
      - "charts/self-host/**"
      - "scripts/**"
      - ".github/workflows/self-host.yml"
      - ".github/workflows/_lint_chart.yml"
      - ".github/workflows/_test_chart.yml"
      - ".github/workflows/_build.yml"
  workflow_dispatch:
  workflow_call:
    secrets:
      AZURE_SUBSCRIPTION_ID:
        required: true
      AZURE_TENANT_ID:
        required: true
      AZURE_CLIENT_ID:
        required: true

permissions:
  contents: read

jobs:
  lint-self-host:
    name: Lint self-host chart
    uses: ./.github/workflows/_lint_chart.yml
    permissions:
      contents: read
    with:
      chart_name: self-host

  test-self-host:
    name: Test self-host chart
    uses: ./.github/workflows/_test_chart.yml
    permissions:
      contents: read
      pull-requests: write
    with:
      chart_name: self-host
  
  test-self-host-kind:
    name: Test self-host chart with Kind (${{ matrix.routing }})
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        routing: [ingress, gateway]
    steps:
      - name: Checkout repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.sha || github.ref }}
          persist-credentials: false

      - name: Set up Helm
        uses: Azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1
        with:
          version: v4.2.0

      - name: Set up lynx
        run: sudo apt install lynx

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.14"
          check-latest: true

      - name: Create kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          config: ${{ matrix.routing == 'gateway' && 'scripts/cluster-gateway.yaml' || 'scripts/cluster.yaml' }}

      - name: Set up cluster
        run: ./scripts/setup.sh setup-cluster "${{ matrix.routing }}"

      - name: Install self-host (${{ matrix.routing }})
        run: ./scripts/setup.sh install-self-host "${{ matrix.routing }}"

      - name: Diagnostics
        if: always()
        shell: bash
        run: |
          echo "*****DEPLOYMENTS*****"; kubectl get deployments -n bitwarden || true
          echo "*****PODS*****";        kubectl get pods -n bitwarden -o wide || true
          echo "*****SERVICES*****";    kubectl get svc -n bitwarden || true
          echo "*****JOBS*****";        kubectl get jobs -n bitwarden || true

          echo "*****EVENTS*****"
          kubectl get events -n bitwarden --sort-by=.lastTimestamp || true

          echo "*****DESCRIBE PODS*****"
          kubectl describe pods -n bitwarden || true

          echo "*****DESCRIBE JOBS*****"
          kubectl describe jobs -n bitwarden || true

          echo "*****POD LOGS*****"
          for pod in $(kubectl get pods -n bitwarden -o jsonpath='{.items[*].metadata.name}'); do
            echo "----- logs: $pod (current) -----"
            kubectl logs "$pod" -n bitwarden --all-containers --tail=200 || true
            echo "----- logs: $pod (previous, if crashed) -----"
            kubectl logs "$pod" -n bitwarden --all-containers --previous --tail=200 || true
          done

          if [ "${{ matrix.routing }}" = "gateway" ]; then
            echo "*****GATEWAY*****";   kubectl describe gateway -n default ci-gateway || true
            echo "*****HTTPROUTE*****"; kubectl describe httproute -n bitwarden || true
          else
            echo "*****INGRESS*****";   kubectl describe ingress -n bitwarden || true
          fi

      - name: Smoke tests
        run: ./scripts/smoke-test.sh

  build-self-host:
    name: Build self-host chart
    uses: ./.github/workflows/_build.yml
    permissions:
      contents: read
      id-token: write
    with:
      chart_name: self-host
    needs:
      - lint-self-host
      - test-self-host
      - test-self-host-kind
    secrets:
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
