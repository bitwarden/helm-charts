name: CD

on:
  push:
    branches: [main]
    # Only charts trigger a release; the bump commit also lives under charts/, so it still
    # re-triggers and resolves to skip (see detect). Non-chart pushes never enter CD.
    paths:
      - charts/**

permissions: {}

# Serialize runs so concurrent merges set the version against the latest main
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  detect:
    name: Detect release
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: read
    outputs:
      charts: ${{ steps.check.outputs.charts || '[]' }}
      bump_type: ${{ steps.bump.outputs.type }}
    steps:
      - name: Resolve PR and bump type
        id: bump
        env:
          GH_TOKEN: ${{ github.token }}
          SHA: ${{ github.sha }}
        run: |
          PR_NUMBER=$(gh api "repos/$GITHUB_REPOSITORY/commits/$SHA/pulls" --jq '.[0].number // empty')
          if [[ -z "$PR_NUMBER" ]]; then
            echo "No PR associated with $SHA (e.g. the version-bump commit); skipping"
            exit 0
          fi
          BUMP_TYPE=$(gh pr view "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --json labels \
            --jq '[.labels[].name | select(startswith("version:"))][0] // empty' | sed 's/^version://')
          if [[ -z "$BUMP_TYPE" ]]; then
            echo "::error::PR #$PR_NUMBER has no version:* label"
            exit 1
          fi
          echo "pr=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "type=$BUMP_TYPE" >> "$GITHUB_OUTPUT"

      - name: Detect charts
        id: detect
        if: steps.bump.outputs.type != '' && steps.bump.outputs.type != 'skip'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.bump.outputs.pr }}
        run: |
          CHARTS=$(gh pr view "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --json files \
            --jq '[.files[].path | select(startswith("charts/")) | split("/")[1]] | map(select(. == "self-host" or . == "sm-operator")) | unique')
          echo "Detected charts: $CHARTS"
          echo "charts=$CHARTS" >> "$GITHUB_OUTPUT"

      - name: Check for chart changes
        id: check
        if: steps.bump.outputs.type != '' && steps.bump.outputs.type != 'skip'
        env:
          CHARTS: ${{ steps.detect.outputs.charts }}
          BUMP_TYPE: ${{ steps.bump.outputs.type }}
        run: |
          # Safety net: the charts/** path filter should guarantee a chart changed whenever a
          # real version bump is requested, so this should never fire. Fail loudly rather than
          # feed an empty matrix downstream or silently release nothing.
          if [[ -z "$CHARTS" || "$(jq 'length' <<< "$CHARTS")" -eq 0 ]]; then
            echo "::error::Version bump '$BUMP_TYPE' requested but no self-host/sm-operator chart changes were detected."
            exit 1
          fi
          echo "charts=$CHARTS" >> "$GITHUB_OUTPUT"

  version-bump:
    name: Version bump (${{ matrix.chart }})
    needs: detect
    if: needs.detect.outputs.bump_type != '' && needs.detect.outputs.bump_type != 'skip'
    uses: ./.github/workflows/_version-bump.yml
    permissions:
      contents: read
      id-token: write
    strategy:
      max-parallel: 1 # one commit to main at a time when a PR touches both charts
      matrix:
        chart: ${{ fromJSON(needs.detect.outputs.charts) }}
    with:
      chart: ${{ matrix.chart }}
      bump_type: ${{ needs.detect.outputs.bump_type }}
    secrets: inherit

  # The deploy-side release-helm-charts publishes whatever the latest successful build
  # uploaded, so release must wait until the build that packaged the bumped version has
  # succeeded on main. One job per bumped chart waits independently for its build whose
  # Chart.yaml version at the run's head commit matches the version now on main, rather than
  # trusting a specific SHA (the bump may land as a squash or merge commit).
  wait-for-build:
    name: Wait for build (${{ matrix.chart }})
    needs:
      - detect
      - version-bump
    if: needs.detect.outputs.bump_type != '' && needs.detect.outputs.bump_type != 'skip'
    runs-on: ubuntu-24.04
    # KIND e2e in the build workflows is slow; give the wait plenty of headroom.
    timeout-minutes: 45
    permissions:
      actions: read # read build-workflow run status
      contents: read
    strategy:
      fail-fast: false
      matrix:
        chart: ${{ fromJSON(needs.detect.outputs.charts) }}
    steps:
      - name: Check out main
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main # the version bump has already landed here
          fetch-depth: 0 # need each build run's head commit to read its Chart.yaml version
          persist-credentials: false

      - name: Wait for chart build
        env:
          GH_TOKEN: ${{ github.token }}
          CHART: ${{ matrix.chart }}
        run: |
          case "$CHART" in
            self-host)   workflow="self-host.yml" ;;
            sm-operator) workflow="sm-operator.yml" ;;
            *) echo "::error::Unknown chart '$CHART'"; exit 1 ;;
          esac

          expected=$(yq -r '.version' "charts/${CHART}/Chart.yaml")
          echo "Locating '$workflow' build packaging $CHART $expected on main..."

          # Find the run for the bumped version (not a stale pre-bump build), waiting for the
          # bump commit's push to spawn it, then let gh run watch block until it succeeds.
          run_id=""
          deadline=$(( SECONDS + 15 * 60 ))
          while (( SECONDS < deadline )); do
            while read -r id sha; do
              [[ -z "$id" ]] && continue
              version=$(git show "${sha}:charts/${CHART}/Chart.yaml" 2>/dev/null | yq -r '.version' 2>/dev/null || echo "")
              if [[ "$version" == "$expected" ]]; then run_id="$id"; break; fi
            done < <(gh run list --workflow "$workflow" --branch main --event push --limit 20 \
              --json databaseId,headSha --jq '.[] | "\(.databaseId) \(.headSha)"')
            [[ -n "$run_id" ]] && break
            echo "  build run not found yet; retrying in 20s"
            sleep 20
          done

          if [[ -z "$run_id" ]]; then
            echo "::error::No '$workflow' build run found for $CHART $expected"
            exit 1
          fi

          echo "Watching build run $run_id for $CHART $expected..."
          gh run watch "$run_id" --exit-status --interval 30

  release:
    name: Release charts
    needs: wait-for-build
    runs-on: ubuntu-24.04
    permissions:
      id-token: write # Azure OIDC for the trigger-actions composite
    steps:
      - name: Trigger release in deploy
        uses: bitwarden/gh-actions/trigger-actions@main
        with:
          azure_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          azure_tenant_id: ${{ secrets.AZURE_TENANT_ID }}
          azure_client_id: ${{ secrets.AZURE_CLIENT_ID }}
          task: release-helm-charts
