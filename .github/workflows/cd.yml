name: CD

on:
  push:
    branches: [main]

permissions: {}

# Serialize runs so concurrent merges set the version against the latest main
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  detect:
    name: Detect release
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: read
    outputs:
      charts: ${{ steps.detect.outputs.charts }}
      bump_type: ${{ steps.bump.outputs.type }}
    steps:
      - name: Resolve PR and bump type
        id: bump
        env:
          GH_TOKEN: ${{ github.token }}
          SHA: ${{ github.sha }}
        run: |
          PR_NUMBER=$(gh api "repos/$GITHUB_REPOSITORY/commits/$SHA/pulls" --jq '.[0].number // empty')
          if [[ -z "$PR_NUMBER" ]]; then
            echo "No PR associated with $SHA (e.g. the version-bump commit); skipping"
            exit 0
          fi
          BUMP_TYPE=$(gh pr view "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --json labels \
            --jq '[.labels[].name | select(startswith("version:"))][0] // empty' | sed 's/^version://')
          if [[ -z "$BUMP_TYPE" ]]; then
            echo "::error::PR #$PR_NUMBER has no version:* label"
            exit 1
          fi
          echo "pr=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "type=$BUMP_TYPE" >> "$GITHUB_OUTPUT"

      - name: Detect charts
        id: detect
        if: steps.bump.outputs.type != '' && steps.bump.outputs.type != 'skip'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.bump.outputs.pr }}
        run: |
          CHARTS=$(gh pr view "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --json files \
            --jq '[.files[].path | select(startswith("charts/")) | split("/")[1]] | map(select(. == "self-host" or . == "sm-operator")) | unique')
          echo "Detected charts: $CHARTS"
          echo "charts=$CHARTS" >> "$GITHUB_OUTPUT"

  version-bump:
    name: Version bump (${{ matrix.chart }})
    needs: detect
    if: needs.detect.outputs.charts != '' && needs.detect.outputs.charts != '[]'
    uses: ./.github/workflows/_version-bump.yml
    permissions:
      contents: read
      id-token: write
    strategy:
      max-parallel: 1 # one commit to main at a time when a PR touches both charts
      matrix:
        chart: ${{ fromJSON(needs.detect.outputs.charts) }}
    with:
      chart: ${{ matrix.chart }}
      bump_type: ${{ needs.detect.outputs.bump_type }}
    secrets: inherit

  release:
    name: Release charts
    needs:
      - detect
      - version-bump
    if: needs.detect.outputs.charts != '' && needs.detect.outputs.charts != '[]'
    runs-on: ubuntu-24.04
    # KIND e2e in the build workflows is slow; give the wait plenty of headroom.
    timeout-minutes: 90
    permissions:
      actions: read # read build-workflow run status
      contents: read
      id-token: write # Azure OIDC for the trigger-actions composite
    steps:
      - name: Check out main
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main # the version bump has already landed here
          fetch-depth: 0 # need each build run's head commit to read its Chart.yaml version
          persist-credentials: false

      # The deploy-side release-helm-charts publishes whatever the latest successful build
      # uploaded, so it must run only after the build that packaged the bumped version has
      # succeeded on main. Wait per bumped chart for a build whose Chart.yaml version at its
      # head commit matches the version now on main, rather than trusting a specific SHA (the
      # bump may land as a squash or merge commit).
      - name: Wait for chart builds
        env:
          GH_TOKEN: ${{ github.token }}
          CHARTS: ${{ needs.detect.outputs.charts }}
        run: |
          for chart in $(jq -r '.[]' <<< "$CHARTS"); do
            case "$chart" in
              self-host)   workflow="self-host.yml" ;;
              sm-operator) workflow="sm-operator.yml" ;;
              *) echo "::error::Unknown chart '$chart'"; exit 1 ;;
            esac

            expected=$(yq -r '.version' "charts/${chart}/Chart.yaml")
            echo "Waiting for '$workflow' build packaging $chart $expected on main..."

            deadline=$(( SECONDS + 40 * 60 ))
            ok=""
            while (( SECONDS < deadline )); do
              runs=$(gh run list --workflow "$workflow" --branch main --event push \
                --limit 20 --json headSha,status,conclusion 2>/dev/null || echo '[]')

              matched_conclusion=""
              while read -r sha conclusion; do
                [[ -z "$sha" ]] && continue
                version=$(git show "${sha}:charts/${chart}/Chart.yaml" 2>/dev/null | yq -r '.version' 2>/dev/null || echo "")
                if [[ "$version" == "$expected" ]]; then
                  if [[ "$conclusion" == "success" ]]; then ok=1; break; fi
                  matched_conclusion="$conclusion"
                fi
              done < <(jq -r '.[] | select(.status == "completed") | "\(.headSha) \(.conclusion)"' <<< "$runs")

              if [[ -n "$ok" ]]; then
                echo "$chart $expected build succeeded"
                break
              fi
              if [[ -n "$matched_conclusion" ]]; then
                echo "::error::'$workflow' build for $chart $expected concluded '$matched_conclusion'"
                exit 1
              fi
              echo "  build not ready yet; retrying in 30s"
              sleep 30
            done

            if [[ -z "$ok" ]]; then
              echo "::error::Timed out waiting for '$workflow' build for $chart $expected"
              exit 1
            fi
          done

      - name: Trigger release in deploy
        uses: bitwarden/gh-actions/trigger-actions@main
        with:
          azure_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          azure_tenant_id: ${{ secrets.AZURE_TENANT_ID }}
          azure_client_id: ${{ secrets.AZURE_CLIENT_ID }}
          task: release-helm-charts
